name: LastFM Daily Ingestion

on:
  schedule:
    - cron: '0 17 * * *'   # 12:00 PM Colombia (COT = UTC-5)
  workflow_dispatch:         # botón manual en GitHub → Actions

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run ingestion (top artists + top tracks)
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python ingest_lastfm.py

      - name: Commit and push JSON to datalake_bronze
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datalake_bronze/lastfm_top_artists/ datalake_bronze/lastfm_top_tracks/
          git diff --staged --quiet || (
            git commit -m "chore: lastfm ingestion $(date -u +%Y-%m-%d)" &&
            git push
          )
