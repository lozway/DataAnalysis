version: "3.8"

x-airflow-common: &airflow-common
  build: .                        # imagen custom con Java + PySpark + VADER
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}
    AIRFLOW_CONN_POSTGRES_ES: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${ES_DB}
    AIRFLOW__WEBSERVER__SECRET_KEY: "nasa-es-etl-secret-key"
    # PySpark memory settings passed as env vars (readable inside tasks)
    SPARK_DRIVER_MEMORY: "1g"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/sql:/opt/airflow/sql
    - ./datalake:/opt/airflow/datalake
    - ./datalake_bronze:/opt/airflow/datalake_bronze
    - ./datalake_silver:/opt/airflow/datalake_silver
    - ./datalake_gold:/opt/airflow/datalake_gold
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — hosts both airflow DB and es_db
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./airflow/sql/init_es_db.sql:/docker-entrypoint-initdb.d/init_es_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${AIRFLOW_DB}"]
      interval: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Airflow Init — one-shot: migrate DB + create admin user + fs_default conn
  # ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" || true &&
        airflow connections add fs_default \
          --conn-type fs \
          --conn-extra '{"path": "/"}' || true
    working_dir: /opt/airflow
    restart: "no"

  # ─────────────────────────────────────────────
  # Airflow Webserver — UI at http://localhost:8080
  # ─────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      retries: 10
    restart: always

  # ─────────────────────────────────────────────
  # Airflow Scheduler — runs DAGs
  # ─────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: always

volumes:
  postgres_data:
